[phases.setup]
nixPkgs = ["google-chrome", "glib", "nss", "nspr", "atk", "cups", "pango", "cairo", "alsa-lib", "libX11", "gcc"]

[phases.build]
cmds = ["npm run build"]

[phases.start]
cmds = ["npm run start"]

[variables]
PUPPETEER_SKIP_CHROMIUM_DOWNLOAD = "true"
# We leave EXECUTABLE_PATH empty here and let the code find it dynamically
